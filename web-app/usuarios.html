<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Guarnieri Network</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    
    <!-- Google Fonts (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Firebase Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <link rel="stylesheet" href="css/usuarios.css">
</head>
<body>

    <!-- Ambient Glows -->
    <div class="ambient-glow glow-top-left"></div>
    <div class="ambient-glow glow-bottom-right"></div>

    <div class="app-container">
        
        <!-- Header Section -->
        <header class="glass-card page-header">
            <div class="brand-logo-title">
                <img src="assets/logo.svg" alt="Logo" class="brand-logo">
                <div>
                    <h1 class="brand-title">GUARNIERI</h1>
                    <span class="brand-subtitle">CONTROL DE USUARIOS</span>
                </div>
            </div>
            <button class="btn-back" onclick="navigateBack()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Volver a Central
            </button>
        </header>

        <!-- Dashboard Content Grid -->
        <main class="dashboard-grid">
            
            <!-- LEFT PANEL: Create / Edit Form -->
            <section class="glass-card" style="padding: 24px;">
                <h2 class="panel-title" id="formPanelTitle">Crear Nuevo Usuario</h2>
                
                <form id="userForm" onsubmit="event.preventDefault(); handleFormSubmit();">
                    
                    <div class="form-group">
                        <label class="form-label" for="inputName">Nombre del Conductor</label>
                        <div class="input-wrapper">
                            <input type="text" id="inputName" class="form-input" placeholder="Ej: Juan Pérez" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="inputUsername">Nombre de Usuario (Login)</label>
                        <div class="input-wrapper">
                            <input type="text" id="inputUsername" class="form-input" placeholder="Ej: conductor1" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="inputPassword">Contraseña de Acceso</label>
                        <div class="input-wrapper">
                            <input type="password" id="inputPassword" class="form-input" placeholder="••••••••" required>
                            <button type="button" class="btn-toggle-password" onclick="togglePasswordVisibility('inputPassword', 'passToggleIcon')">
                                <svg id="passToggleIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <div style="margin-top: 28px;">
                        <button type="submit" class="btn-submit" id="btnSubmitForm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            <span id="btnSubmitText">Crear Usuario</span>
                        </button>
                        
                        <button type="button" class="btn-cancel-edit" id="btnCancelEdit" style="display: none;" onclick="cancelEditMode()">
                            Cancelar Edición
                        </button>
                    </div>

                </form>
            </section>

            <!-- RIGHT PANEL: Registered Users List -->
            <section class="glass-card" style="padding: 24px; display: flex; flex-direction: column;">
                <h2 class="panel-title">
                    Usuarios Registrados
                    <span class="user-count-badge" id="userCountBadge">0</span>
                </h2>
                
                <!-- Search bar -->
                <div class="search-bar-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar por conductor o nombre de usuario..." oninput="handleSearch(this.value)">
                </div>

                <!-- Users Dynamic List -->
                <div class="users-list" id="usersListContainer">
                    <!-- Dynamic rendering -->
                </div>
            </section>

        </main>
        
    </div>

    <!-- Custom elegant toast notification system -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Custom sleek confirmation modal for deletes -->
    <div class="modal-overlay" id="deleteModalOverlay">
        <div class="glass-card modal-card animate-fade">
            <div style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px auto; box-shadow: 0 0 15px rgba(239, 68, 68, 0.25);">
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </div>
            
            <span style="font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; color: #ef4444; text-transform: uppercase;">Eliminar Usuario</span>
            <h2 style="font-size: 1.2rem; font-weight: 800; color: white; margin: 4px 0 10px 0; letter-spacing: 0.5px;">¿ESTÁS SEGURO?</h2>
            <p style="color: var(--text-dim); font-size: 0.8rem; line-height: 1.5; margin-bottom: 24px;">Esta acción eliminará al conductor <b id="deleteModalName" style="color: white;">-</b> de forma permanente. No podrá volver a iniciar sesión.</p>
            
            <div style="display: flex; gap: 12px;">
                <button onclick="closeDeleteModal()" class="btn-cancel-edit" style="margin: 0; width: 50%; padding: 12px;">Cancelar</button>
                <button id="btnConfirmDelete" class="btn-submit" style="background: #ef4444; color: white; border: none; margin: 0; width: 50%; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Logic Controller Script -->
    <script src="js/usuarios.js"></script>
</body>
</html>
