<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - Guarnieri Network</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    
    <!-- Google Fonts (Outfit) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Firebase Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDsW0BOCa-O90zy2RfuEfLACSBXOHFjwGE",
          authDomain: "correo-fleet.firebaseapp.com",
          databaseURL: "https://correo-fleet-default-rtdb.firebaseio.com",
          projectId: "correo-fleet",
          storageBucket: "correo-fleet.firebasestorage.app",
          messagingSenderId: "851994949651",
          appId: "1:851994949651:web:836e718f630aadf7aaa7e6",
          measurementId: "G-WN36724L4C"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
    </script>
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(17, 24, 39, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-cyan: #06b6d4;
            --accent-indigo: #4f46e5;
            --accent-green: #10b981;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            background: radial-gradient(circle at center, #111827 0%, #0b0f19 100%);
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Ambient glowing layers */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, rgba(0,0,0,0) 75%);
            z-index: 0;
            pointer-events: none;
        }
        .glow-top-left { top: -150px; left: -150px; }
        .glow-bottom-right { bottom: -150px; right: -150px; background: radial-gradient(circle, rgba(79, 70, 229, 0.08) 0%, rgba(0,0,0,0) 75%); }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Main Container */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* General Glass Card Style */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Header branding styles */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            border: 1px solid var(--card-border);
        }

        .brand-logo-title {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-logo {
            width: 44px;
            height: 44px;
            filter: drop-shadow(0 2px 10px rgba(6, 182, 212, 0.4));
            transition: transform 0.3s ease;
        }

        .brand-logo:hover {
            transform: rotate(6deg) scale(1.05);
        }

        .brand-title {
            font-size: 1.3rem;
            font-weight: 800;
            line-height: 1;
            letter-spacing: 0.5px;
            color: white;
        }

        .brand-subtitle {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 3px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Navigation buttons */
        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Dashboard layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel-title {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-count-badge {
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent-cyan);
            border: 1px solid rgba(6, 182, 212, 0.3);
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 700;
        }

        /* Inputs & Labels */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-left: 2px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-input:focus {
            border-color: var(--accent-cyan);
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
        }

        .form-input:read-only {
            opacity: 0.6;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.05);
            background: rgba(0,0,0,0.15);
        }

        /* Password Toggle Button */
        .btn-toggle-password {
            position: absolute;
            right: 14px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .btn-toggle-password:hover {
            color: white;
        }

        /* Buttons styles */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-indigo) 100%);
            border-radius: 12px;
            font-weight: 600;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-1.5px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
            filter: brightness(1.05);
        }

        .btn-cancel-edit {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            text-align: center;
            margin-top: 10px;
        }

        .btn-cancel-edit:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        /* Search Filter bar */
        .search-bar-container {
            margin-bottom: 20px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: white;
            outline: none;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--accent-indigo);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            pointer-events: none;
        }

        /* Users list grid cards */
        .users-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 520px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .user-item-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            transition: all 0.2s ease;
            animation: fadeIn 0.3s ease-out;
        }

        .user-item-card:hover {
            border-color: rgba(79, 70, 229, 0.15);
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-1px);
        }

        .user-profile-info {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        /* Avatar badge with gradient */
        .user-avatar-badge {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
            border: 1.5px solid rgba(255,255,255,0.15);
        }

        .user-details {
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-name-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-login-sub {
            font-size: 0.72rem;
            color: var(--text-dim);
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Eye revealer button for listing */
        .password-reveal-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.15);
            border-radius: 6px;
            padding: 2px 6px;
            font-size: 0.65rem;
            border: 1px solid rgba(255,255,255,0.03);
            width: fit-content;
        }

        .password-reveal-text {
            filter: blur(4px);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: filter 0.2s ease, max-width 0.3s ease;
        }

        .password-reveal-wrapper:hover .password-reveal-text {
            filter: blur(0);
            max-width: 400px;
        }

        /* User action buttons */
        .user-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .action-icon-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            width: 34px;
            height: 34px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-icon-btn:hover {
            color: white;
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05);
        }

        .action-icon-btn.edit-btn:hover {
            color: var(--accent-cyan);
            border-color: rgba(6, 182, 212, 0.3);
            background: rgba(6, 182, 212, 0.1);
        }

        .action-icon-btn.delete-btn {
            color: rgba(239, 68, 68, 0.8);
        }

        .action-icon-btn.delete-btn:hover {
            color: var(--accent-red);
            border-color: rgba(239, 68, 68, 0.3);
            background: rgba(239, 68, 68, 0.1);
        }

        /* Empty Onboarding Card */
        .empty-users-card {
            border: 2px dashed rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
        }

        .empty-users-card svg {
            margin-bottom: 12px;
            opacity: 0.35;
        }

        /* Toast sliding popups */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast-item {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 22px;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: white;
            pointer-events: auto;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast-item.active {
            transform: translateX(0);
            opacity: 1;
        }

        .toast-item.success {
            border-left: 4px solid var(--accent-green);
        }

        .toast-item.error {
            border-left: 4px solid var(--accent-red);
        }

        .toast-item.info {
            border-left: 4px solid var(--accent-cyan);
        }

        .toast-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Custom Deletion Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            z-index: 20000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            width: 90%;
            max-width: 380px;
            padding: 30px 24px;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .animate-shake {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body>

    <!-- Ambient Glows -->
    <div class="ambient-glow glow-top-left"></div>
    <div class="ambient-glow glow-bottom-right"></div>

    <div class="app-container">
        
        <!-- Header Section -->
        <header class="glass-card page-header">
            <div class="brand-logo-title">
                <img src="assets/logo.svg" alt="Logo" class="brand-logo">
                <div>
                    <h1 class="brand-title">GUARNIERI</h1>
                    <span class="brand-subtitle">CONTROL DE USUARIOS</span>
                </div>
            </div>
            <button class="btn-back" onclick="navigateBack()">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                Volver a Central
            </button>
        </header>

        <!-- Dashboard Content Grid -->
        <main class="dashboard-grid">
            
            <!-- LEFT PANEL: Create / Edit Form -->
            <section class="glass-card" style="padding: 24px;">
                <h2 class="panel-title" id="formPanelTitle">Crear Nuevo Usuario</h2>
                
                <form id="userForm" onsubmit="event.preventDefault(); handleFormSubmit();">
                    
                    <div class="form-group">
                        <label class="form-label" for="inputName">Nombre del Conductor</label>
                        <div class="input-wrapper">
                            <input type="text" id="inputName" class="form-input" placeholder="Ej: Juan Pérez" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="inputUsername">Nombre de Usuario (Login)</label>
                        <div class="input-wrapper">
                            <input type="text" id="inputUsername" class="form-input" placeholder="Ej: conductor1" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="inputPassword">Contraseña de Acceso</label>
                        <div class="input-wrapper">
                            <input type="password" id="inputPassword" class="form-input" placeholder="••••••••" required>
                            <button type="button" class="btn-toggle-password" onclick="togglePasswordVisibility('inputPassword', 'passToggleIcon')">
                                <svg id="passToggleIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </div>

                    <div style="margin-top: 28px;">
                        <button type="submit" class="btn-submit" id="btnSubmitForm">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                            <span id="btnSubmitText">Crear Usuario</span>
                        </button>
                        
                        <button type="button" class="btn-cancel-edit" id="btnCancelEdit" style="display: none;" onclick="cancelEditMode()">
                            Cancelar Edición
                        </button>
                    </div>

                </form>
            </section>

            <!-- RIGHT PANEL: Registered Users List -->
            <section class="glass-card" style="padding: 24px; display: flex; flex-direction: column;">
                <h2 class="panel-title">
                    Usuarios Registrados
                    <span class="user-count-badge" id="userCountBadge">0</span>
                </h2>
                
                <!-- Search bar -->
                <div class="search-bar-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar por conductor o nombre de usuario..." oninput="handleSearch(this.value)">
                </div>

                <!-- Users Dynamic List -->
                <div class="users-list" id="usersListContainer">
                    <!-- Dynamic rendering -->
                </div>
            </section>

        </main>
        
    </div>

    <!-- Custom elegant toast notification system -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Custom sleek confirmation modal for deletes -->
    <div class="modal-overlay" id="deleteModalOverlay">
        <div class="glass-card modal-card animate-fade">
            <div style="background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 50%; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; margin: 0 auto 18px auto; box-shadow: 0 0 15px rgba(239, 68, 68, 0.25);">
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </div>
            
            <span style="font-size: 0.65rem; font-weight: 800; letter-spacing: 2px; color: #ef4444; text-transform: uppercase;">Eliminar Usuario</span>
            <h2 style="font-size: 1.2rem; font-weight: 800; color: white; margin: 4px 0 10px 0; letter-spacing: 0.5px;">¿ESTÁS SEGURO?</h2>
            <p style="color: var(--text-dim); font-size: 0.8rem; line-height: 1.5; margin-bottom: 24px;">Esta acción eliminará al conductor <b id="deleteModalName" style="color: white;">-</b> de forma permanente. No podrá volver a iniciar sesión.</p>
            
            <div style="display: flex; gap: 12px;">
                <button onclick="closeDeleteModal()" class="btn-cancel-edit" style="margin: 0; width: 50%; padding: 12px;">Cancelar</button>
                <button id="btnConfirmDelete" class="btn-submit" style="background: #ef4444; color: white; border: none; margin: 0; width: 50%; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);">Eliminar</button>
            </div>
        </div>
    </div>

    <!-- Logic Controller Script -->
    <script>
        // Array global de usuarios
        let users = [];
        
        // Estado de edición
        let isEditMode = false;
        let editTargetUsername = '';

        // Variable para controlar usuario a borrar
        let deleteTargetUsername = '';

        // Funciones de cifrado bidireccional para contraseñas en LocalStorage
        function cryptPass(text) {
            if (!text) return '';
            return 'ENC:' + btoa(encodeURIComponent(text).split('').map(c => String.fromCharCode(c.charCodeAt(0) ^ 88)).join(''));
        }
        function decryptPass(text) {
            if (!text) return '';
            if (!text.startsWith('ENC:')) return text; // Es texto plano
            try {
                const decodedBase64 = atob(text.substring(4));
                const unxored = decodedBase64.split('').map(c => String.fromCharCode(c.charCodeAt(0) ^ 88)).join('');
                return decodeURIComponent(unxored);
            } catch(e) {
                return text; // Fallback
            }
        }


        // Comprobación de seguridad de sesión al cargar
        function checkAdminSession() {
            // El usuario debe estar autenticado
            if (sessionStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'index.html';
                return false;
            }
            return true;
        }

        // Cargar usuarios de Firebase en tiempo real
        async function loadUsers() {
            try {
                database.ref('users').on('value', (snapshot) => {
                    if (snapshot.exists()) {
                        users = snapshot.val() || [];
                    } else {
                        // Inicializar con valores por defecto en la nube
                        users = [
                            { username: 'admin', name: 'Administrador', password: cryptPass('1234') },
                            { username: 'conductor1', name: 'Juan Pérez', password: cryptPass('1234') },
                            { username: 'conductor2', name: 'María Gómez', password: cryptPass('1234') }
                        ];
                        saveUsersToStorage();
                    }
                    renderUsers();
                });
            } catch (e) {
                console.error("Error al cargar usuarios:", e);
                showToast("Error al conectar con la base de datos de usuarios", "error");
            }
        }

        // Guardar usuarios en Firebase
        async function saveUsersToStorage() {
            try {
                await database.ref('users').set(users);
            } catch (e) {
                console.error("Error al guardar usuarios:", e);
                showToast("Error al guardar cambios en la nube", "error");
            }
        }

        // Renderizar lista en HTML
        function renderUsers(filterQuery = '') {
            const container = document.getElementById('usersListContainer');
            const query = filterQuery.toLowerCase().trim();
            
            const filteredUsers = users.filter(u => 
                u.name.toLowerCase().includes(query) || 
                u.username.toLowerCase().includes(query)
            );

            document.getElementById('userCountBadge').innerText = filteredUsers.length;

            if (filteredUsers.length === 0) {
                container.innerHTML = `
                    <div class="empty-users-card">
                        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        <p>No se encontraron usuarios registrados.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            filteredUsers.forEach(u => {
                // Obtener iniciales para el avatar
                const initials = u.name.split(' ')
                                      .map(w => w.charAt(0))
                                      .slice(0, 2)
                                      .join('');

                // Determinar si es un admin o un conductor regular para estilos visuales
                const isAdmin = u.username.toLowerCase() === 'admin';
                const avatarGradient = isAdmin 
                    ? 'linear-gradient(135deg, var(--accent-orange), #ea580c)' 
                    : 'linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan))';
                
                const avatarShadow = isAdmin
                    ? 'rgba(249, 115, 22, 0.25)'
                    : 'rgba(79, 70, 229, 0.2)';

                html += `
                    <div class="user-item-card">
                        <div class="user-profile-info">
                            <div class="user-avatar-badge" style="background: ${avatarGradient}; box-shadow: 0 4px 10px ${avatarShadow};">
                                ${initials}
                            </div>
                            <div class="user-details">
                                <span class="user-name-title">${u.name}</span>
                                <div class="user-login-sub">
                                    <span>👤 ${u.username}</span>
                                    <span>•</span>
                                    <div class="password-reveal-wrapper">
                                        <span>🔑</span>
                                        <span class="password-reveal-text" id="reveal-${u.username}">${decryptPass(u.password)}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="user-actions">
                            <button onclick="editUser('${u.username}')" class="action-icon-btn edit-btn" title="Modificar">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                            </button>
                            <button onclick="promptDeleteUser('${u.username}')" class="action-icon-btn delete-btn" title="Eliminar" ${isAdmin ? 'disabled style="opacity: 0.3; cursor: not-allowed;"' : ''}>
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Manejar el submit del formulario
        async function handleFormSubmit() {
            const name = document.getElementById('inputName').value.trim();
            const username = document.getElementById('inputUsername').value.trim().toLowerCase();
            const password = document.getElementById('inputPassword').value;

            if (!name || !username || !password) {
                showToast("Por favor complete todos los campos", "error");
                return;
            }

            if (isEditMode) {
                // Modo Edición
                const userIndex = users.findIndex(u => u.username === editTargetUsername);
                if (userIndex !== -1) {
                    users[userIndex].name = name;
                    // Guardar la contraseña encriptada bidireccionalmente
                    if (password) {
                        users[userIndex].password = cryptPass(password);
                    }
                    saveUsersToStorage();
                    speakSystem(`Usuario ${name} modificado correctamente.`);
                    showToast("Usuario modificado con éxito", "success");
                    cancelEditMode();
                    renderUsers();
                } else {
                    showToast("Error: No se encontró el usuario a modificar", "error");
                }
            } else {
                // Modo Creación
                // Cifrar la contraseña ingresada bidireccionalmente
                const hashedPassword = cryptPass(password);
                
                // Comprobar si el username ya existe
                const exists = users.some(u => u.username === username);
                if (exists) {
                    const card = document.querySelector('.glass-card');
                    card.classList.add('animate-shake');
                    setTimeout(() => card.classList.remove('animate-shake'), 400);
                    showToast("El nombre de usuario ya está registrado", "error");
                    return;
                }

                // Crear usuario
                const newUser = { username, name, password: hashedPassword };
                users.push(newUser);
                saveUsersToStorage();
                speakSystem(`Usuario ${name} creado con éxito.`);
                showToast("Usuario registrado con éxito", "success");
                
                // Limpiar formulario
                document.getElementById('userForm').reset();
                renderUsers();
            }
        }

        // Cargar un usuario en el formulario para editarlo
        window.editUser = function(username) {
            const user = users.find(u => u.username === username);
            if (!user) return;

            isEditMode = true;
            editTargetUsername = username;

            // Rellenar formulario
            document.getElementById('inputName').value = user.name;
            document.getElementById('inputUsername').value = user.username;
            document.getElementById('inputUsername').readOnly = true; // El username es identificador único
            document.getElementById('inputPassword').value = decryptPass(user.password);
            document.getElementById('inputPassword').placeholder = 'Ingresar contraseña';

            // Cambiar textos y botones del panel
            document.getElementById('formPanelTitle').innerText = "Modificar Usuario";
            document.getElementById('btnSubmitText').innerText = "Guardar Cambios";
            document.getElementById('btnSubmitForm').style.background = "linear-gradient(135deg, var(--accent-green) 0%, var(--accent-cyan) 100%)";
            document.getElementById('btnSubmitForm').style.boxShadow = "0 4px 15px rgba(16, 185, 129, 0.25)";
            document.getElementById('btnCancelEdit').style.display = "block";

            // Scroll suave hacia el formulario en móviles
            document.querySelector('.dashboard-grid').scrollIntoView({ behavior: 'smooth' });
            
            showToast(`Modificando a ${user.name}`, "info");
        };

        // Cancelar modo de edición
        window.cancelEditMode = function() {
            isEditMode = false;
            editTargetUsername = '';

            // Limpiar formulario y quitar solo-lectura
            document.getElementById('userForm').reset();
            document.getElementById('inputUsername').readOnly = false;
            document.getElementById('inputPassword').placeholder = 'Ingresar contraseña';

            // Reestablecer títulos y botones
            document.getElementById('formPanelTitle').innerText = "Crear Nuevo Usuario";
            document.getElementById('btnSubmitText').innerText = "Crear Usuario";
            document.getElementById('btnSubmitForm').style.background = "linear-gradient(135deg, var(--accent-cyan) 0%, var(--accent-indigo) 100%)";
            document.getElementById('btnSubmitForm').style.boxShadow = "0 4px 15px rgba(6, 182, 212, 0.25)";
            document.getElementById('btnCancelEdit').style.display = "none";
        };

        // Mostrar confirmación elegante antes de borrar
        window.promptDeleteUser = function(username) {
            const user = users.find(u => u.username === username);
            if (!user) return;

            // Evitar borrar administrador principal
            if (username.toLowerCase() === 'admin') {
                showToast("El administrador principal no puede ser eliminado", "error");
                return;
            }

            deleteTargetUsername = username;
            document.getElementById('deleteModalName').innerText = user.name;
            
            // Mostrar modal
            const overlay = document.getElementById('deleteModalOverlay');
            overlay.classList.add('active');
        };

        // Cerrar modal
        window.closeDeleteModal = function() {
            const overlay = document.getElementById('deleteModalOverlay');
            overlay.classList.remove('active');
            deleteTargetUsername = '';
        };

        // Confirmar eliminación del usuario
        document.getElementById('btnConfirmDelete').addEventListener('click', () => {
            if (!deleteTargetUsername) return;

            const userIndex = users.findIndex(u => u.username === deleteTargetUsername);
            if (userIndex !== -1) {
                const deletedName = users[userIndex].name;
                users.splice(userIndex, 1);
                saveUsersToStorage();
                
                speakSystem(`Usuario ${deletedName} eliminado.`);
                showToast("Usuario eliminado correctamente", "success");
                
                // Si el usuario borrado estaba cargado en el formulario de edición, cancelarlo
                if (isEditMode && editTargetUsername === deleteTargetUsername) {
                    cancelEditMode();
                }

                closeDeleteModal();
                renderUsers();
            }
        });

        // Filtrado en vivo de búsqueda
        window.handleSearch = function(value) {
            renderUsers(value);
        };

        // Navegar hacia atrás con animación y voz
        window.navigateBack = function() {
            speakSystem("Retornando a la central de monitoreo.");
            setTimeout(() => {
                window.location.href = 'central.html';
            }, 500);
        };

        // Visualización de contraseña toggle
        window.togglePasswordVisibility = function(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
            } else {
                input.type = "password";
                icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
            }
        };

        // Toast Notification System
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const item = document.createElement('div');
            
            let iconSvg = '';
            if (type === 'success') {
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${window.getComputedStyle(document.documentElement).getPropertyValue('--accent-green')}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
            } else if (type === 'error') {
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${window.getComputedStyle(document.documentElement).getPropertyValue('--accent-red')}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`;
            } else {
                iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${window.getComputedStyle(document.documentElement).getPropertyValue('--accent-cyan')}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>`;
            }

            item.className = `toast-item ${type} glass-card`;
            item.innerHTML = `
                <div class="toast-icon">${iconSvg}</div>
                <div>${message}</div>
            `;
            
            container.appendChild(item);
            
            // Forzar reflow para animación
            setTimeout(() => item.classList.add('active'), 10);
            
            // Auto borrar
            setTimeout(() => {
                item.classList.remove('active');
                setTimeout(() => item.remove(), 400);
            }, 3000);
        }

        // Sintetizador de voz
        function speakSystem(text) {
            if (typeof SpeechSynthesisUtterance !== 'undefined') {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'es-ES';
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            }
        }

        // Inicialización al cargar la ventana
        window.onload = async () => {
            if (checkAdminSession()) {
                await loadUsers();
                renderUsers();
                speakSystem("Panel de gestión de usuarios cargado.");
            }
        };
    </script>
</body>
</html>
