<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Correo Service</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --secondary: #10b981;
            --bg-dark: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #map {
            flex: 1;
            width: 100%;
            z-index: 1;
        }

        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: max-height 0.3s ease-out, padding 0.3s ease-out;
            overflow: hidden;
        }

        .glass-card.collapsed {
            max-height: 60px;
        }

        .collapse-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 4px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        .search-container {
            display: flex;
            gap: 8px;
        }

        input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .stops-list {
            max-height: 200px;
            overflow-y: auto;
            margin-top: 8px;
        }

        .stop-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
            gap: 10px;
        }

        .stop-item.origin {
            border-left: 4px solid var(--secondary);
            background: rgba(16, 185, 129, 0.05);
        }

        .origin-badge {
            background: var(--secondary);
            color: white;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            font-weight: 600;
        }

        .stop-item.completed {
            opacity: 0.5;
            text-decoration: line-through;
            border-left: 4px solid #94a3b8;
        }

        .nav-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 15px;
            z-index: 2000;
            display: none;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .nav-bar h3 { font-size: 1rem; }
        .nav-bar p { font-size: 0.8rem; opacity: 0.9; }

        .btn-arrived {
            background: white;
            color: var(--primary);
            width: 100%;
            margin-top: 5px;
        }

        .voice-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2100;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        .stop-name {
            white-space: normal;
            word-break: break-word;
            flex: 1;
            line-height: 1.3;
        }

        .remove-btn {
            background: transparent;
            color: #ef4444;
            padding: 4px;
        }

        .fab-optimize {
            position: absolute;
            bottom: 30px;
            right: 20px;
            z-index: 1000;
            border-radius: 50px;
            padding: 16px 28px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
            font-size: 1rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .fab-nav {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 1000;
            border-radius: 50px;
            padding: 16px 28px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            font-size: 1rem;
            background: var(--secondary);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }
        .voice-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 8px 12px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .voice-controls input {
            flex: 1;
            height: 4px;
            accent-color: white;
        }

        .step-instruction {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-weight: 600;
            color: #fff;
            border-left: 4px solid white;
        }
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 5000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .login-card {
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .login-card h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: white;
        }

        .login-input {
            width: 100%;
            margin-bottom: 15px;
            padding: 14px;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            outline: none;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border-radius: 12px;
            font-weight: 600;
            margin-top: 10px;
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card glass-card animate-fade">
            <img src="favicon.png" alt="Logo" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
            <h1>Bienvenido a <br>Correo Service</h1>
            <p style="color: var(--text-dim); margin-bottom: 25px; font-size: 0.9rem;">Ingresa tus credenciales para continuar</p>
            <input type="text" id="userInput" class="login-input" placeholder="Usuario">
            <input type="password" id="passInput" class="login-input" placeholder="Contraseña">
            <button class="login-btn" onclick="handleLogin()">Iniciar Sesión</button>
            <p id="loginError" class="error-msg">Usuario o contraseña incorrectos</p>
            
            <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                <p style="font-size: 0.7rem; color: var(--text-dim); letter-spacing: 1px;">
                    Desarrollado por<br>
                    <span style="color: white; font-weight: 600;">GUARNIERI NETWORK</span>
                </p>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="navBar" class="nav-bar animate-fade">
        <div class="voice-toggle" onclick="toggleVoice()" id="voiceBtn">
            <svg id="voiceOn" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <svg id="voiceOff" style="display:none" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v6H5v-4h2.21"/><path d="M11 5v4.21"/><path d="M11 19l-5-4"/><path d="M15.54 8.46a5 5 0 0 1 2.36 6.13"/><path d="M19.07 4.93a10 10 0 0 1 1.63 11.37"/></svg>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div style="width: 100%;">
                <p>Próximo destino:</p>
                <h3 id="nextStopName">Cargando...</h3>
                <p id="distDisplay">Calculando distancia...</p>
                
                <div id="stepBox" class="step-instruction">
                    <p id="stepText">Sigue derecho</p>
                </div>

                <div class="voice-controls">
                    <span style="font-size: 0.7rem;">Volumen</span>
                    <input type="range" id="voiceVolume" min="0" max="1" step="0.1" value="1" oninput="updateVolume(this.value)">
                </div>
            </div>
            <button onclick="stopNavigation()" style="background: rgba(255,255,255,0.2); padding: 8px;">✕</button>
        </div>
        <button class="btn-arrived" onclick="manualArrival()">Ya llegué / Siguiente</button>
    </div>

    <div class="ui-overlay" id="mainUI">
        <div class="glass-card animate-fade" id="mainCard">
            <button class="collapse-btn" onclick="toggleCollapse()">
                <svg id="collapseIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
            </button>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-right: 30px;">
                <h2 style="font-size: 1.2rem; font-weight: 600;">Correo Service</h2>
                <button onclick="logout()" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 6px 12px; font-size: 0.7rem; border-radius: 8px;">Salir</button>
            </div>
            
            <div style="margin-bottom: 16px;">
                <label style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; display: block;">Punto de Partida (Base)</label>
                <div class="search-container">
                    <input type="text" id="originInput" placeholder="Ej: Depósito Central">
                    <button onclick="setOrigin()" style="background: var(--secondary);">+</button>
                </div>
            </div>

            <label style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; display: block;">Destinos de Entrega</label>
            <div class="search-container">
                <input type="text" id="addressInput" placeholder="Ej: Calle 123, Ciudad">
                <button onclick="addStop()">+</button>
            </div>

            <div id="stopsList" class="stops-list">
                <!-- Stops will appear here -->
                <div style="text-align: center; color: var(--text-dim); padding: 20px; font-size: 0.8rem;">
                    Agrega la base y los destinos
                </div>
            </div>

            <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;">
                    <input type="checkbox" id="returnToBase" style="width: 18px; height: 18px;">
                    Regresar a base al finalizar
                </label>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button onclick="saveRoute()" style="background: rgba(255,255,255,0.1); font-size: 0.8rem;">Guardar Ruta</button>
                    <button onclick="loadRoute()" style="background: rgba(255,255,255,0.1); font-size: 0.8rem;">Cargar Ruta</button>
                </div>
            </div>
        </div>
    </div>

    <button id="btnNav" class="fab-nav" onclick="startNavigation()">
        <span>Iniciar GPS</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
    </button>

    <button class="fab-optimize" onclick="optimizeRoute()">
        <span>Optimizar Ruta</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
    </button>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        let map;
        let origin = null;
        let stops = [];
        let markers = [];
        let originMarker = null;
        let routeLine;
        let userMarker = null;
        let watchId = null;
        let isNavigating = false;
        let currentTargetIndex = -1;
        let voiceEnabled = true;
        let voiceVol = 1.0;
        let nearTargetSpoken = false;
        let routeSteps = [];
        let currentStepIndex = 0;
        let lastInstruction = "";
        
        // REEMPLAZA ESTO CON TU CLAVE GRATUITA DE OPENROUTESERVICE.ORG
        const ORS_API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjAwYjE5NTQ3MzEzYjRkOTFiNDc3ODQ5M2MzMjA4ZTkwIiwiaCI6Im11cm11cjY0In0='; 

        // Inicializar Mapa
        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([-34.6037, -58.3816], 13);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);
            
            // Intentar obtener ubicación actual
            map.locate({setView: true, maxZoom: 15});
        }

        async function setOrigin() {
            const input = document.getElementById('originInput');
            const query = input.value;
            if (!query) return;

            const result = await searchAddress(query);
            if (result) {
                if (originMarker) map.removeLayer(originMarker);
                
                origin = {
                    name: result.display_name,
                    lat: parseFloat(result.lat),
                    lon: parseFloat(result.lon)
                };

                originMarker = L.marker([origin.lat, origin.lon], {
                    icon: L.divIcon({
                        className: 'custom-div-icon',
                        html: "<div style='background-color:#10b981; width:12px; height:12px; border-radius:50%; border:2px solid white;'></div>",
                        iconSize: [12, 12],
                        iconAnchor: [6, 6]
                    })
                }).addTo(map).bindPopup("<b>Base:</b> " + origin.name).openPopup();

                map.panTo([origin.lat, origin.lon]);
                input.value = '';
                renderStops();
            }
        }

        async function searchAddress(query) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                return data.length > 0 ? data[0] : null;
            } catch (error) {
                console.error(error);
                return null;
            }
        }

        async function addStop() {
            const input = document.getElementById('addressInput');
            const query = input.value;
            if (!query) return;

            const result = await searchAddress(query);
            if (result) {
                const lat = parseFloat(result.lat);
                const lon = parseFloat(result.lon);
                
                const stop = {
                    id: Date.now(),
                    name: result.display_name,
                    lat: lat,
                    lon: lon
                };

                stops.push(stop);
                renderStops();
                
                const marker = L.marker([lat, lon]).addTo(map)
                    .bindPopup(stop.name).openPopup();
                markers.push({id: stop.id, marker: marker});
                
                map.panTo([lat, lon]);
                input.value = '';
            } else {
                alert('No se encontró la dirección');
            }
        }

        function renderStops() {
            const container = document.getElementById('stopsList');
            if (!origin && stops.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: var(--text-dim); padding: 20px; font-size: 0.8rem;">Agrega la base y los destinos</div>';
                return;
            }

            let html = '';
            
            if (origin) {
                html += `
                    <div class="stop-item origin animate-fade">
                        <span class="stop-name">
                            <span class="origin-badge">BASE</span>
                            ${origin.name}
                        </span>
                    </div>
                `;
            }

            html += stops.map(stop => `
                <div class="stop-item animate-fade ${stop.completed ? 'completed' : ''}">
                    <span class="stop-name">
                        ${stop.name}
                    </span>
                    ${!stop.completed ? `
                    <button class="remove-btn" onclick="removeStop(${stop.id})">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                    </button>` : '✅'}
                </div>
            `).join('');

            container.innerHTML = html;
        }

        function removeStop(id) {
            stops = stops.filter(s => s.id !== id);
            const markerObj = markers.find(m => m.id === id);
            if (markerObj) {
                map.removeLayer(markerObj.marker);
                markers = markers.filter(m => m.id !== id);
            }
            renderStops();
        }

        async function optimizeRoute() {
            if (!origin || stops.length < 1) {
                alert('Agrega el punto de partida y al menos 1 destino');
                return;
            }

            if (ORS_API_KEY === 'TU_CLAVE_AQUI') {
                alert('Por favor, ingresa tu clave gratuita de OpenRouteService en el código para ver el trazado por las calles.');
                // Trazado simple como fallback
                drawSimpleRoute();
                return;
            }

            const returnToBase = document.getElementById('returnToBase').checked;

            const coords = [
                [origin.lon, origin.lat],
                ...stops.map(s => [s.lon, s.lat])
            ];

            if (returnToBase) {
                coords.push([origin.lon, origin.lat]);
            }

            try {
                const response = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': ORS_API_KEY
                    },
                    body: JSON.stringify({ coordinates: coords })
                });

                if (!response.ok) throw new Error('Error en el servicio de rutas');

                const data = await response.json();
                const routeCoords = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
                
                // Guardar pasos para navegación por voz
                routeSteps = data.features[0].properties.segments[0].steps;
                currentStepIndex = 0;

                if (routeLine) map.removeLayer(routeLine);
                routeLine = L.polyline(routeCoords, {
                    color: '#4f46e5',
                    weight: 5,
                    opacity: 0.8,
                    lineJoin: 'round'
                }).addTo(map);

                map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});
                
                const distance = (data.features[0].properties.summary.distance / 1000).toFixed(2);
                const duration = Math.round(data.features[0].properties.summary.duration / 60);
                
                document.getElementById('btnNav').style.display = 'flex';
                alert(`Ruta optimizada: ${distance} km - aprox. ${duration} min`);

            } catch (error) {
                console.error(error);
                alert('Hubo un problema al calcular la ruta por las calles. Usando trazado simple.');
                drawSimpleRoute();
            }
        }

        function drawSimpleRoute() {
            if (routeLine) map.removeLayer(routeLine);
            const coords = [
                [origin.lat, origin.lon],
                ...stops.map(s => [s.lat, s.lon])
            ];
            routeLine = L.polyline(coords, {color: '#4f46e5', weight: 4, opacity: 0.6, dashArray: '5, 10'}).addTo(map);
            map.fitBounds(routeLine.getBounds(), {padding: [50, 50]});
            document.getElementById('btnNav').style.display = 'flex';
        }

        function startNavigation() {
            if (!origin || stops.length === 0) return;
            
            isNavigating = true;
            currentTargetIndex = 0;
            nearTargetSpoken = false;
            document.getElementById('mainUI').style.display = 'none';
            document.getElementById('btnNav').style.display = 'none';
            document.getElementById('navBar').style.display = 'flex';
            
            updateNavUI();
            startTracking();
            speak(`Iniciando navegación. Tu primera parada es ${stops[0].name}`);
        }

        function startTracking() {
            if (!navigator.geolocation) return;

            watchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const userPos = [lat, lon];

                    if (!userMarker) {
                        userMarker = L.circleMarker(userPos, {
                            radius: 8,
                            fillColor: "#3b82f6",
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 1
                        }).addTo(map);
                    } else {
                        userMarker.setLatLng(userPos);
                    }

                    if (isNavigating) {
                        map.setView(userPos, 17, { animate: true }); // Zoom más cercano para GPS
                        checkArrival(lat, lon);
                        processTurnByTurn(lat, lon);
                    }
                },
                (err) => console.error(err),
                { enableHighAccuracy: true }
            );
        }

        function checkArrival(userLat, userLon) {
            if (currentTargetIndex >= stops.length) return;
            
            const target = stops[currentTargetIndex];
            const dist = getDistance(userLat, userLon, target.lat, target.lon);
            
            document.getElementById('distDisplay').innerText = `Distancia a destino: ${dist.toFixed(0)} m`;

            if (dist < 100 && !nearTargetSpoken) {
                speak(`Te estás acercando a tu destino: ${target.name}`);
                nearTargetSpoken = true;
            }

            if (dist < 30) { // 30 metros para considerar llegada automática
                speak("Has llegado a tu destino.");
                manualArrival();
            }
        }

        function processTurnByTurn(userLat, userLon) {
            if (!routeSteps || routeSteps.length === 0 || currentStepIndex >= routeSteps.length) return;

            const step = routeSteps[currentStepIndex];
            // La API de ORS no da las coords exactas de cada paso en el GeoJSON de forma simple aquí,
            // pero podemos estimar el progreso por la distancia total del segmento si fuera necesario.
            // Para simplificar, mostraremos la instrucción actual y la siguiente basada en proximidad.
            
            const stepBox = document.getElementById('stepBox');
            const stepText = document.getElementById('stepText');
            
            if (step.instruction !== lastInstruction) {
                stepBox.style.display = 'block';
                stepText.innerText = step.instruction;
                speak(step.instruction);
                lastInstruction = step.instruction;
            }

            // Si la distancia al destino es pequeña, podríamos avanzar pasos, 
            // pero el API de ORS agrupa los pasos por segmentos entre paradas.
        }

        function manualArrival() {
            if (currentTargetIndex < stops.length) {
                stops[currentTargetIndex].completed = true;
                currentTargetIndex++;
                nearTargetSpoken = false;
                
                if (currentTargetIndex >= stops.length) {
                    speak("Felicidades, has completado todas las entregas. Gracias por Utilizar Correo Service");
                    alert('¡Has completado todas las entregas!');
                    stopNavigation();
                } else {
                    speak(`Siguiente parada: ${stops[currentTargetIndex].name}`);
                    updateNavUI();
                    renderStops();
                }
            }
        }

        function updateNavUI() {
            const target = stops[currentTargetIndex];
            document.getElementById('nextStopName').innerText = target.name;
        }

        function stopNavigation() {
            isNavigating = false;
            document.getElementById('mainUI').style.display = 'flex';
            document.getElementById('navBar').style.display = 'none';
            document.getElementById('btnNav').style.display = 'flex';
            if (watchId) navigator.geolocation.clearWatch(watchId);
            renderStops();
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Radio de la tierra en metros
            const f1 = lat1 * Math.PI/180;
            const f2 = lat2 * Math.PI/180;
            const df = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(df/2) * Math.sin(df/2) +
                      Math.cos(f1) * Math.cos(f2) *
                      Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // --- PERSISTENCIA (GUARDAR / CARGAR) ---
        function saveRoute() {
            if (!origin && stops.length === 0) {
                alert("No hay nada que guardar.");
                return;
            }
            const routeData = {
                origin: origin,
                stops: stops,
                returnToBase: document.getElementById('returnToBase').checked
            };
            localStorage.setItem('savedRoute', JSON.stringify(routeData));
            alert("Ruta guardada correctamente para mañana.");
        }

        function loadRoute() {
            const saved = localStorage.getItem('savedRoute');
            if (!saved) {
                alert("No tienes rutas guardadas.");
                return;
            }
            
            const data = JSON.parse(saved);
            
            // Limpiar mapa actual
            if (originMarker) map.removeLayer(originMarker);
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];
            
            // Restaurar datos
            origin = data.origin;
            stops = data.stops.map(s => ({...s, completed: false})); // Reiniciar progreso
            document.getElementById('returnToBase').checked = data.returnToBase;
            
            // Re-dibujar en mapa
            if (origin) {
                originMarker = L.marker([origin.lat, origin.lon], {
                    icon: L.divIcon({
                        className: 'custom-div-icon',
                        html: "<div style='background-color:#10b981; width:12px; height:12px; border-radius:50%; border:2px solid white;'></div>",
                        iconSize: [12, 12],
                        iconAnchor: [6, 6]
                    })
                }).addTo(map).bindPopup("<b>Base:</b> " + origin.name);
            }
            
            stops.forEach(stop => {
                const marker = L.marker([stop.lat, stop.lon]).addTo(map).bindPopup(stop.name);
                markers.push({id: stop.id, marker: marker});
            });
            
            renderStops();
            if (origin) map.panTo([origin.lat, origin.lon]);
            alert("Ruta cargada. ¡Listo para salir!");
        }

        // --- GUÍA POR VOZ ---
        function speak(text) {
            if (!voiceEnabled) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'es-ES';
            msg.rate = 1.0;
            msg.volume = voiceVol;
            window.speechSynthesis.speak(msg);
        }

        function updateVolume(val) {
            voiceVol = parseFloat(val);
            // Pequeña prueba para que el usuario escuche el nivel
            if (isNavigating) speak("Volumen");
        }

        function toggleVoice() {
            voiceEnabled = !voiceEnabled;
            document.getElementById('voiceOn').style.display = voiceEnabled ? 'block' : 'none';
            document.getElementById('voiceOff').style.display = voiceEnabled ? 'none' : 'block';
        }

        window.onload = () => {
            initMap();
            checkSession();
        };

        function checkSession() {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('loginOverlay').style.display = 'none';
            }
        }

        function handleLogin() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            
            // CREDENCIALES POR DEFECTO
            if (user === 'admin' && pass === '1234') {
                sessionStorage.setItem('isLoggedIn', 'true');
                const overlay = document.getElementById('loginOverlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            } else {
                const error = document.getElementById('loginError');
                error.style.display = 'block';
                // Animación de sacudida
                const card = document.querySelector('.login-card');
                card.style.animation = 'shake 0.4s';
                setTimeout(() => card.style.animation = '', 400);
            }
        }

        function logout() {
            sessionStorage.removeItem('isLoggedIn');
            const overlay = document.getElementById('loginOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = '1', 10);
            
            // Limpiar campos de login
            document.getElementById('userInput').value = '';
            document.getElementById('passInput').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function toggleCollapse() {
            const card = document.getElementById('mainCard');
            const icon = document.getElementById('collapseIcon');
            card.classList.toggle('collapsed');
            
            if (card.classList.contains('collapsed')) {
                icon.innerHTML = '<path d="m6 9 6 6 6-6"/>'; // Flecha abajo
            } else {
                icon.innerHTML = '<path d="m18 15-6-6-6 6"/>'; // Flecha arriba
            }
        }
    </script>
</body>
</html>
