<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Correo Service</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- MQTT Real-Time Communications -->
    <!-- Firebase Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <!-- Pantalla de Login -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card glass-card animate-fade">
            <div class="brand-logo-container">
                <img src="assets/logo.svg" alt="Correo Service Logo" class="brand-logo">
            </div>
            <h1 class="brand-title">CORREO</h1>
            <div class="brand-subtitle">SERVICE</div>
            
            <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 20px;">
                <p style="color: var(--text-dim); font-size: 0.85rem; margin: 0;">Ingresa tus credenciales</p>
                <div class="online-status-indicator online"><span class="status-dot online"></span> En Línea</div>
            </div>
            
            <form onsubmit="event.preventDefault(); handleLogin();" style="display: flex; flex-direction: column; width: 100%;">
                <div class="login-field-container">
                    <label class="login-label">Usuario</label>
                    <input type="text" id="userInput" class="login-input" placeholder="Ingresar Usuario" required>
                </div>
                
                <div class="login-field-container">
                    <label class="login-label">Contraseña</label>
                    <input type="password" id="passInput" class="login-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="login-btn">Iniciar Sesión</button>
            </form>
            <button onclick="showAdminPrompt()" class="login-btn" style="background: rgba(6, 182, 212, 0.08); border: 1px solid rgba(6, 182, 212, 0.3); color: var(--accent-cyan); margin-top: 10px; box-shadow: 0 4px 15px rgba(6, 182, 212, 0.1);">Monitoreo Central</button>
            <p id="loginError" class="error-msg">Usuario o contraseña incorrectos</p>
            
            <div style="margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 15px;">
                <p style="font-size: 0.65rem; color: var(--text-dim); letter-spacing: 1px;">
                    Desarrollado por<br>
                    <span style="color: white; font-weight: 600; letter-spacing: 1.5px;">GUARNIERI NETWORK</span>
                </p>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <!-- Compact Top Instruction Box -->
    <div id="topNavInstruction" class="nav-instruction animate-fade" style="display: none;">
        <div id="stepBox" class="step-instruction">
            <p id="stepText">Sigue derecho</p>
        </div>
        <div class="dist-next">
            <p id="distDisplay" style="font-size: 0.85rem; font-weight: 700; color: #10b981; margin:0;">Calculando...</p>
        </div>
    </div>

    <!-- Compact Bottom Navigation Bar -->
    <div id="navBar" class="nav-bar animate-fade">
        <div class="nav-bar-content">
            <div style="flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden;">
                <p style="font-size: 0.65rem; color: var(--text-dim); margin:0; text-transform: uppercase;">Próximo Destino</p>
                <h3 id="nextStopName" style="font-size: 0.95rem; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: white;">Cargando...</h3>
            </div>
            
            <div style="display: flex; gap: 8px; align-items: center;">
                <button class="icon-btn" onclick="toggleVoice()" id="voiceBtn">
                    <svg id="voiceOn" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
                    <svg id="voiceOff" style="display:none" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/><path d="M9 9v6H5v-4h2.21"/><path d="M11 5v4.21"/><path d="M11 19l-5-4"/><path d="M15.54 8.46a5 5 0 0 1 2.36 6.13"/><path d="M19.07 4.93a10 10 0 0 1 1.63 11.37"/></svg>
                </button>
                <button id="sosBtnNav" onclick="toggleSOS()" class="icon-btn sos-btn">SOS</button>
                <button class="btn-arrived" onclick="manualArrival()">Llegué</button>
                <button class="icon-btn danger" onclick="stopNavigation()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="ui-overlay" id="mainUI">
        <div class="glass-card animate-fade" id="mainCard">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <img src="assets/logo.svg" alt="Logo" style="width: 32px; height: 32px; filter: drop-shadow(0 2px 6px rgba(6, 182, 212, 0.3));">
                    <div>
                        <h2 style="font-size: 1.1rem; font-weight: 800; line-height: 1; color: white; letter-spacing: 0.5px;">CORREO</h2>
                        <span style="font-size: 0.65rem; font-weight: 600; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;">SERVICE</span>
                    </div>
                </div>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <div class="online-status-indicator online"><span class="status-dot online"></span> En Línea</div>
                    <button id="sosBtnMain" onclick="toggleSOS()" style="background: #ef4444; color: white; padding: 6px 12px; font-size: 0.7rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; transition: all 0.2s; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); animation: statusPulse 2s infinite;">S.O.S</button>
                    <button onclick="logout()" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 6px 12px; font-size: 0.7rem; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: all 0.2s;">Salir</button>
                    <button class="collapse-btn" onclick="toggleCollapse()">
                        <svg id="collapseIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
                    </button>
                </div>
            </div>
            
            <div style="margin-bottom: 16px; position: relative;">
                <label style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; display: block;">Punto de Partida (Base)</label>
                <div class="search-container">
                    <input type="text" id="originInput" placeholder="Ej: Depósito Central" oninput="showSuggestions(this, 'originSuggestions', true)">
                    <button onclick="setOrigin()" style="background: var(--secondary);">+</button>
                </div>
                <div id="originSuggestions" class="autocomplete-suggestions"></div>
            </div>

            <div style="position: relative; margin-bottom: 16px;">
                <label style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 4px; display: block;">Destinos de Entrega</label>
                <div class="search-container">
                    <input type="text" id="addressInput" placeholder="Ej: Calle 123, Ciudad" oninput="showSuggestions(this, 'destSuggestions', false)">
                    <button onclick="addStop()">+</button>
                </div>
                <div id="destSuggestions" class="autocomplete-suggestions"></div>
            </div>

            <div id="stopsList" class="stops-list">
                <!-- Stops will appear here -->
                <div style="text-align: center; color: var(--text-dim); padding: 20px; font-size: 0.8rem;">
                    Agrega la base y los destinos
                </div>
            </div>

            <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 10px;">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.85rem; cursor: pointer;">
                    <input type="checkbox" id="returnToBase" style="width: 18px; height: 18px;">
                    Regresar a base al finalizar
                </label>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button onclick="saveRoute()" style="background: rgba(255,255,255,0.1); font-size: 0.8rem;">Guardar Ruta</button>
                    <button onclick="loadRoute()" style="background: rgba(255,255,255,0.1); font-size: 0.8rem;">Cargar Ruta</button>
                </div>
            </div>
        </div>
    </div>

    <button id="btnNav" class="fab-nav" onclick="startNavigation()">
        <span>Iniciar GPS</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
    </button>

    <button class="fab-optimize" onclick="optimizeRoute()">
        <span>Optimizar Ruta</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
    </button>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="js/index.js"></script>
</body>
</html>
